<!DOCTYPE html>
<html dir="ltr">
<head>
    <meta charset="utf-8">
    <title>AI Trading Engine | Pro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d1117; color: #c9d1d9; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .card { background-color: #161b22; padding: 25px; border-radius: 12px; border: 1px solid #30363d; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: left; }
        h1 { text-align: center; color: #58a6ff; margin-top: 0; font-weight: 300; letter-spacing: 1px; }
        h2 { text-align: center; color: #58a6ff; margin-top: 0; font-size: 1.3em; font-weight: 400; border-bottom: 1px solid #30363d; padding-bottom: 10px; }

        /* Input Row Styling */
        .input-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; }
        select, input { padding: 12px; font-size: 15px; border-radius: 6px; border: 1px solid #30363d; outline: none; background: #0d1117; color: #c9d1d9; width: 100%; transition: 0.3s; }
        select:focus, input:focus { border-color: #58a6ff; }
        select { cursor: pointer; }

        button { padding: 12px 20px; font-size: 15px; background-color: #238636; color: white; border: 1px solid rgba(240,246,252,0.1); border-radius: 6px; cursor: pointer; font-weight: 600; width: 100%; transition: 0.2s; }
        button:hover { background-color: #2ea043; }
        .sell-btn { background-color: #da3633; }
        .sell-btn:hover { background-color: #f85149; }
        .auth-btn { background-color: #1f6feb; }
        .auth-btn:hover { background-color: #388bfd; }

        .result-box { margin-top: 15px; padding: 15px; background-color: #0d1117; border: 1px solid #30363d; border-radius: 8px; font-size: 15px; display: none; }

        /* Prediction styling */
        .prediction-horizon { background-color: #161b22; padding: 12px; margin-top: 10px; border-radius: 6px; border-left: 4px solid #3fb950; border-top: 1px solid #30363d; border-right: 1px solid #30363d; border-bottom: 1px solid #30363d;}
        .prediction-horizon.sell { border-left-color: #f85149; }
        .portfolio-item { display: flex; justify-content: space-between; border-bottom: 1px solid #30363d; padding: 10px 0; }

        /* Auth Section */
        .auth-section { display: flex; flex-direction: column; gap: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 AI Algo-Trading Pro</h1>

        <div class="card" id="authCard">
            <h2>Investor Login</h2>
            <div class="auth-section">
                <input type="email" id="userEmail" placeholder="Email Address" autocomplete="off" />
                <input type="password" id="userPassword" placeholder="Password" autocomplete="off" />
                <div class="input-row">
                    <button class="auth-btn" onclick="alert('Backend connection pending...')">Login</button>
                    <button style="background-color: transparent; border: 1px solid #30363d; color: #c9d1d9;" onclick="alert('Registration module pending...')">Create Account</button>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>1. AI Market Analysis</h2>
            <div class="input-row">
                <select id="assetType" style="flex: 1;">
                    <option value="crypto">Cryptocurrency</option>
                    <option value="stock">Stocks & ETFs</option>
                </select>
                <input type="text" id="aiTicker" placeholder="Symbol (e.g. BTC, AAPL)" autocomplete="off" style="flex: 2; text-align: center;" />
            </div>
            <button onclick="getPrediction()">Analyze Asset</button>
            <div id="aiResult" class="result-box"></div>
        </div>

        <div class="card">
            <h2>2. Execution Engine</h2>
            <div class="input-row">
                <input type="text" id="tradeTicker" placeholder="Symbol (e.g. AAPL)" autocomplete="off" />
                <input type="number" id="tradeQty" placeholder="Quantity" min="1" />
            </div>
            <div style="display: flex; gap: 10px;">
                <button onclick="executeTrade('buy')">Execute Buy</button>
                <button class="sell-btn" onclick="executeTrade('sell')">Execute Sell</button>
            </div>
            <div id="tradeResult" class="result-box" style="text-align: center;"></div>
        </div>

        <div class="card">
            <h2>3. Live Portfolio</h2>
            <button onclick="viewPortfolio()" style="background-color: #21262d; border: 1px solid #30363d; color: #c9d1d9;">Sync Live Data</button>
            <div id="portfolioResult" class="result-box"></div>
        </div>
    </div>

    <script>
        async function getPrediction() {
            const assetType = document.getElementById('assetType').value;
            const stock = document.getElementById('aiTicker').value.toUpperCase();
            const resDiv = document.getElementById('aiResult');

            if (!stock) return;

            resDiv.style.display = 'block';
            resDiv.innerHTML = '<div style="text-align:center; color: #8b949e;">⏳ Analyzing market patterns and computing predictive models...</div>';

            try {
                const response = await fetch(`/api/ai-advisor/${assetType}/${stock}`);
                const data = await response.json();

                if (!response.ok || data.detail) {
                    resDiv.innerHTML = `❌ Data Retrieval Error: ${data.detail || 'Endpoint missing'}`; return;
                }
                if (data.error) {
                    resDiv.innerHTML = `❌ ${data.error}`; return;
                }

                let html = `<h3 style="text-align:center; margin-bottom:10px; color: #c9d1d9;">${data.ticker} Market Price: $${data.current_price.toLocaleString()}</h3>`;

                data.predictions.forEach(pred => {
                    const isBuy = pred.recommendation.includes('BUY');
                    const color = isBuy ? '#3fb950' : '#f85149';
                    const cssClass = isBuy ? '' : 'sell';

                    html += `
                    <div class="prediction-horizon ${cssClass}">
                        <strong style="color: #58a6ff;">Target Horizon: ${pred.timeline}</strong><br>
                        Projected Value: $${pred.predicted_price.toLocaleString()}
                        (<span style="color: ${color}">${pred.change_pct > 0 ? '+' : ''}${pred.change_pct}%</span>)<br>
                        <span style="color: ${color}; font-weight: bold; font-size: 16px; display: inline-block; margin-top: 5px;">Action: ${pred.recommendation}</span>
                    </div>`;
                });

                resDiv.innerHTML = html;

            } catch (e) { resDiv.innerHTML = '❌ Network Connection Error'; }
        }

        async function executeTrade(action) {
            const ticker = document.getElementById('tradeTicker').value.toUpperCase();
            const qty = parseInt(document.getElementById('tradeQty').value);
            const resDiv = document.getElementById('tradeResult');
            if (!ticker || isNaN(qty) || qty <= 0) {
                resDiv.style.display = 'block'; resDiv.innerHTML = '⚠️ Invalid parameters'; return;
            }

            resDiv.style.display = 'block'; resDiv.innerHTML = '<span style="color: #8b949e;">⏳ Routing order to market...</span>';

            try {
                const response = await fetch('/api/trade/' + action, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ticker: ticker, quantity: qty })
                });
                const data = await response.json();

                if (data.error) {
                    resDiv.innerHTML = `<span style="color: #f85149;">❌ ${data.error}</span>`;
                } else {
                    resDiv.innerHTML = `<span style="color: #3fb950;">✅ ${data.message}</span>`;
                    viewPortfolio();
                }
            } catch (e) { resDiv.innerHTML = '❌ Order routing failed'; }
        }

        async function viewPortfolio() {
            const resDiv = document.getElementById('portfolioResult');
            resDiv.style.display = 'block'; resDiv.innerHTML = '<div style="text-align:center; color: #8b949e;">⏳ Syncing with exchange APIs...</div>';

            try {
                const response = await fetch('/api/portfolio');
                const data = await response.json();

                let html = `<h3 style="color: #c9d1d9;">Net Asset Value: <span style="color: #58a6ff;">$${data.net_worth.toLocaleString()}</span></h3>`;
                html += `<p style="color: #8b949e;">Available Liquidity: $${data.cash.toLocaleString()}</p><hr style="border:0; border-top: 1px solid #30363d;">`;

                if (Object.keys(data.holdings).length === 0) {
                    html += `<p style="text-align:center; color:#8b949e;">No active positions.</p>`;
                } else {
                    for (const [ticker, info] of Object.entries(data.holdings)) {
                        const percent = ((info.total_value / data.net_worth) * 100).toFixed(1);
                        html += `
                        <div class="portfolio-item">
                            <div><b style="color: #c9d1d9;">${ticker}</b> <span style="color: #8b949e;">(${info.quantity} units)</span></div>
                            <div style="color: #3fb950;">$${info.total_value.toLocaleString()}</div>
                        </div>
                        <div style="width: 100%; background: #21262d; height: 4px; margin-bottom: 8px; border-radius: 2px; margin-top: 5px;">
                            <div style="width: ${percent}%; background: #58a6ff; height: 100%; border-radius: 2px;"></div>
                        </div>
                        <small style="color: #8b949e;">Market Price: $${info.current_price} | Portfolio Weight: ${percent}%</small>
                        <br><br>`;
                    }
                }
                resDiv.innerHTML = html;
            } catch (e) { resDiv.innerHTML = '❌ Sync failed'; }
        }
    </script>
</body>
</html>
