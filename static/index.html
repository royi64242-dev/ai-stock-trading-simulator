<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Trading Engine | Pro</title>
    <style>
        /* הגדרת פלטת הצבעים למצב יום ולילה */
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --border: #30363d;
            --primary: #58a6ff;
            --btn-primary: #1f6feb;
            --btn-primary-hover: #388bfd;
            --success: #3fb950;
            --danger: #f85149;
            --input-bg: #0d1117;
            --shadow: rgba(0, 0, 0, 0.5);
        }

        [data-theme="light"] {
            --bg-color: #f6f8fa;
            --card-bg: #ffffff;
            --text-main: #24292f;
            --text-muted: #57606a;
            --border: #d0d7de;
            --primary: #0969da;
            --btn-primary: #0969da;
            --btn-primary-hover: #0349b4;
            --success: #1a7f37;
            --danger: #cf222e;
            --input-bg: #ffffff;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        /* עיצוב בסיסי מותאם לנייד */
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            text-align: center;
            padding: 15px;
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
            font-size: 16px;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 800px;
            margin: 0 auto 20px auto;
        }

        h1 { color: var(--primary); margin: 0; font-weight: 600; font-size: 1.5rem; }
        h2 { color: var(--primary); margin-top: 0; font-size: 1.2rem; font-weight: 500; border-bottom: 1px solid var(--border); padding-bottom: 10px; text-align: left;}

        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .theme-toggle:hover { border-color: var(--primary); }

        .container { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px var(--shadow);
            text-align: left;
            transition: 0.3s;
        }

        /* התאמת השדות למסכים קטנים (flex-wrap) */
        .input-row { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 15px; }
        select, input {
            padding: 14px;
            font-size: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            outline: none;
            background: var(--input-bg);
            color: var(--text-main);
            flex: 1;
            min-width: 140px;
            transition: 0.3s;
        }
        select:focus, input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.3); }
        select { cursor: pointer; }

        /* כפתורים מוגדלים שנוחים ללחיצה באצבע */
        button {
            padding: 14px 20px;
            font-size: 1rem;
            background-color: var(--success);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            flex: 1;
            min-width: 120px;
            transition: 0.2s;
        }
        button:hover { filter: brightness(1.1); }
        .sell-btn { background-color: var(--danger); }
        .auth-btn { background-color: var(--btn-primary); }
        .secondary-btn { background-color: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .secondary-btn:hover { border-color: var(--text-main); }

        .result-box { margin-top: 15px; padding: 15px; background-color: var(--bg-color); border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; display: none; }

        .prediction-horizon { background-color: var(--card-bg); padding: 15px; margin-top: 10px; border-radius: 8px; border-left: 5px solid var(--success); border-top: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);}
        .prediction-horizon.sell { border-left-color: var(--danger); }
        .portfolio-item { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding: 12px 0; }

        .auth-section { display: flex; flex-direction: column; gap: 12px; }
    </style>
</head>
<body>
    <div class="header-container">
        <h1>📊 AI Trading Pro</h1>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
    </div>

    <div class="container">
        <div class="card" id="authCard">
            <h2>Investor Login</h2>
            <div class="auth-section">
                <input type="email" id="userEmail" placeholder="Email Address" autocomplete="off" />
                <input type="password" id="userPassword" placeholder="Password" autocomplete="off" />
                <div class="input-row">
                    <button class="auth-btn" onclick="alert('Backend connection pending...')">Secure Login</button>
                    <button class="secondary-btn" onclick="alert('Registration module pending...')">Create Account</button>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>1. AI Market Analysis</h2>
            <div class="input-row">
                <select id="assetType">
                    <option value="crypto">Cryptocurrency</option>
                    <option value="stock">Stocks & ETFs</option>
                </select>
                <input type="text" id="aiTicker" placeholder="Symbol (e.g. BTC, AAPL)" autocomplete="off" style="text-align: center;" />
            </div>
            <button class="auth-btn" onclick="getPrediction()" style="width: 100%;">Analyze Asset</button>
            <div id="aiResult" class="result-box"></div>
        </div>

        <div class="card">
            <h2>2. Execution Engine</h2>
            <div class="input-row">
                <input type="text" id="tradeTicker" placeholder="Symbol (e.g. AAPL)" autocomplete="off" />
                <input type="number" id="tradeQty" placeholder="Qty" min="1" />
            </div>
            <div class="input-row">
                <button onclick="executeTrade('buy')">Buy</button>
                <button class="sell-btn" onclick="executeTrade('sell')">Sell</button>
            </div>
            <div id="tradeResult" class="result-box" style="text-align: center;"></div>
        </div>

        <div class="card">
            <h2>3. Live Portfolio</h2>
            <button class="secondary-btn" onclick="viewPortfolio()" style="width: 100%;">Sync Live Data</button>
            <div id="portfolioResult" class="result-box"></div>
        </div>
    </div>

    <script>
        // --- מערכת עיצוב (Dark/Light Mode) ---
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            document.getElementById('themeBtn').innerText = newTheme === 'light' ? '☀️' : '🌙';
            localStorage.setItem('ui-theme', newTheme);
        }

        // טעינת העיצוב השמור כשהעמוד עולה
        document.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('ui-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('themeBtn').innerText = savedTheme === 'light' ? '☀️' : '🌙';
        });

        // --- לוגיקת API ---
        async function getPrediction() {
            const assetType = document.getElementById('assetType').value;
            const stock = document.getElementById('aiTicker').value.toUpperCase();
            const resDiv = document.getElementById('aiResult');

            if (!stock) return;

            resDiv.style.display = 'block';
            resDiv.innerHTML = '<div style="text-align:center; color: var(--text-muted);">⏳ Analyzing market patterns...</div>';

            try {
                const response = await fetch(`/api/ai-advisor/${assetType}/${stock}`);
                const data = await response.json();

                if (!response.ok || data.detail) {
                    resDiv.innerHTML = `<span style="color: var(--danger);">❌ Data Retrieval Error: ${data.detail || 'Endpoint missing'}</span>`; return;
                }
                if (data.error) {
                    resDiv.innerHTML = `<span style="color: var(--danger);">❌ ${data.error}</span>`; return;
                }

                let html = `<h3 style="text-align:center; margin-bottom:10px;">${data.ticker} Market Price: $${data.current_price.toLocaleString()}</h3>`;

                data.predictions.forEach(pred => {
                    const isBuy = pred.recommendation.includes('BUY');
                    const color = isBuy ? 'var(--success)' : 'var(--danger)';
                    const cssClass = isBuy ? '' : 'sell';

                    html += `
                    <div class="prediction-horizon ${cssClass}">
                        <strong style="color: var(--primary);">Target Horizon: ${pred.timeline}</strong><br>
                        Projected Value: $${pred.predicted_price.toLocaleString()}
                        (<span style="color: ${color}">${pred.change_pct > 0 ? '+' : ''}${pred.change_pct}%</span>)<br>
                        <span style="color: ${color}; font-weight: bold; font-size: 1.1rem; display: inline-block; margin-top: 5px;">Action: ${pred.recommendation}</span>
                    </div>`;
                });

                resDiv.innerHTML = html;

            } catch (e) { resDiv.innerHTML = '<span style="color: var(--danger);">❌ Network Connection Error</span>'; }
        }

        async function executeTrade(action) {
            const ticker = document.getElementById('tradeTicker').value.toUpperCase();
            const qty = parseInt(document.getElementById('tradeQty').value);
            const resDiv = document.getElementById('tradeResult');
            if (!ticker || isNaN(qty) || qty <= 0) {
                resDiv.style.display = 'block'; resDiv.innerHTML = '⚠️ Invalid parameters'; return;
            }

            resDiv.style.display = 'block'; resDiv.innerHTML = '<span style="color: var(--text-muted);">⏳ Routing order to market...</span>';

            try {
                const response = await fetch('/api/trade/' + action, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ticker: ticker, quantity: qty })
                });
                const data = await response.json();

                if (data.error) {
                    resDiv.innerHTML = `<span style="color: var(--danger);">❌ ${data.error}</span>`;
                } else {
                    resDiv.innerHTML = `<span style="color: var(--success);">✅ ${data.message}</span>`;
                    viewPortfolio();
                }
            } catch (e) { resDiv.innerHTML = '<span style="color: var(--danger);">❌ Order routing failed</span>'; }
        }

        async function viewPortfolio() {
            const resDiv = document.getElementById('portfolioResult');
            resDiv.style.display = 'block'; resDiv.innerHTML = '<div style="text-align:center; color: var(--text-muted);">⏳ Syncing with exchange APIs...</div>';

            try {
                const response = await fetch('/api/portfolio');
                const data = await response.json();

                let html = `<h3>Net Asset Value: <span style="color: var(--primary);">$${data.net_worth.toLocaleString()}</span></h3>`;
                html += `<p style="color: var(--text-muted);">Available Liquidity: $${data.cash.toLocaleString()}</p><hr style="border:0; border-top: 1px solid var(--border); margin: 15px 0;">`;

                if (Object.keys(data.holdings).length === 0) {
                    html += `<p style="text-align:center; color:var(--text-muted);">No active positions.</p>`;
                } else {
                    for (const [ticker, info] of Object.entries(data.holdings)) {
                        const percent = ((info.total_value / data.net_worth) * 100).toFixed(1);
                        html += `
                        <div class="portfolio-item">
                            <div><b>${ticker}</b> <span style="color: var(--text-muted);">(${info.quantity} units)</span></div>
                            <div style="color: var(--success); font-weight: 500;">$${info.total_value.toLocaleString()}</div>
                        </div>
                        <div style="width: 100%; background: var(--border); height: 6px; margin-bottom: 8px; border-radius: 3px; margin-top: 5px;">
                            <div style="width: ${percent}%; background: var(--primary); height: 100%; border-radius: 3px;"></div>
                        </div>
                        <small style="color: var(--text-muted);">Market Price: $${info.current_price} | Portfolio Weight: ${percent}%</small>
                        <br><br>`;
                    }
                }
                resDiv.innerHTML = html;
            } catch (e) { resDiv.innerHTML = '<span style="color: var(--danger);">❌ Sync failed</span>'; }
        }
    </script>
</body>
</html>
